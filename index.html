<title>할일농장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#2E7D32;--primary-light:#4CAF50;--primary-dark:#1B5E20;--primary-bg:rgba(46,125,50,0.06);--cream:#FAFAF5;--warm:#F3F0E8;--gold:#F9A825;--text:#1C1C1C;--text-sub:#6E6E6E;--text-hint:#AAA;--border:rgba(0,0,0,0.08);--shadow:0 1px 4px rgba(0,0,0,0.06);--shadow-md:0 4px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 24px rgba(0,0,0,0.12);--radius:16px;--radius-sm:10px;--radius-xs:6px;--nav-h:56px;--safe-bottom:env(safe-area-inset-bottom,0px);--fab-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;outline:none}
.app{display:none;flex-direction:column;height:100%}
.main{flex:1;overflow:hidden;position:relative}
.page{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.nav{display:flex;align-items:center;justify-content:space-around;height:var(--nav-h);background:#fff;border-top:1px solid var(--border);flex-shrink:0;z-index:100;padding-bottom:var(--safe-bottom)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 16px;color:var(--text-hint);font-size:10px;font-weight:500;transition:color .2s;min-width:56px}
.nav-btn.on{color:var(--primary)}
.nav-btn .ni{font-size:20px;line-height:1}
#splash{position:fixed;inset:0;background:linear-gradient(145deg,#1B5E20,#2E7D32,#388E3C);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s}
#splash.hide{opacity:0;pointer-events:none}
.splash-t{font-family:'Gaegu',cursive;font-size:48px;color:#fff;letter-spacing:2px}
.splash-s{font-size:13px;color:rgba(255,255,255,.6);margin-top:4px}
.splash-e{font-size:64px;margin-bottom:16px;animation:bi .8s ease-out}
.hh{padding:20px 20px 16px;background:linear-gradient(180deg,#E8F5E9,var(--cream))}
.hp{display:flex;align-items:center;gap:14px}
.ha{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;box-shadow:var(--shadow-md);overflow:hidden;background:#fff;flex-shrink:0}
.ha img{width:100%;height:100%;object-fit:contain;object-position:center 40%;background:var(--cream)}
.ha .tr{position:absolute;inset:-3px;border-radius:50%;border:3px solid var(--gold)}
.hi{flex:1;min-width:0}
.hn{font-size:15px;font-weight:700}
.ht{font-size:11px;font-weight:600;margin-top:1px}
.hx{font-size:10px;color:var(--text-sub);margin-top:3px}
.xb{height:6px;background:var(--border);border-radius:3px;margin-top:4px;overflow:hidden}
.xf{height:100%;background:linear-gradient(90deg,var(--primary-light),var(--primary));border-radius:3px;transition:width .5s}
.sb{display:flex;align-items:center;gap:8px;margin:10px 20px 0;padding:10px 14px;background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow)}
.sf{font-size:20px}
.si{flex:1}
.sc{font-size:13px;font-weight:700}
.sl{font-size:10px;color:var(--text-sub)}
.sh{font-size:13px;font-weight:700;padding:18px 20px 8px;display:flex;align-items:center;gap:6px}
.sh .bg{font-size:10px;color:#fff;background:var(--primary);padding:1px 7px;border-radius:10px}
.tl{padding:0 20px}
.te{text-align:center;color:var(--text-hint);font-size:12px;padding:20px 0}
.tc{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;margin-bottom:6px;background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow);transition:all .3s}
.tc.done{opacity:.45}
.tc.done .tt{text-decoration:line-through;color:var(--text-hint)}
.tc.imp{border-left:3px solid var(--primary)}
.ck{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:all .2s;margin-top:1px}

function dlb(s){if(!s||!s.includes('-'))return'';const p=s.split('-');return`${+p[1]}월 ${+p[2]}일`}
function esc(s){return typeof s==='string'?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''}
function fmT(t){if(!t||!t.includes(':'))return'';const p=t.split(':'),h=parseInt(p[0])||0;return`${h>=12?(h===12?12:h-12):h||12}:${p[1]||'00'} ${h>=12?'PM':'AM'}`}
function isOv(t){if(!t||!t.includes(':'))return false;const n=new Date(),p=t.split(':').map(Number);return n.getHours()>p[0]||(n.getHours()===p[0]&&n.getMinutes()>=p[1])}
function gOK(p){if(!p||!p.equipped)return'body';const r=[];IC.slice(1).forEach(c=>{if(p.equipped[c])r.push(p.equipped[c])});return r.length?r.sort().join('+'):'body'}

function rTL(cid,ds,cnt){const ls=S.todos.filter(t=>t.date===ds).sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;const at=a.time||'',bt=b.time||'';if(at&&!bt)return-1;if(!at&&bt)return 1;if(at&&bt)return at.localeCompare(bt);if((a.sortOrder||9999)!==(b.sortOrder||9999))return(a.sortOrder||9999)-(b.sortOrder||9999);if(a.importance!==b.importance)return a.importance==='must'?-1:1;return 0});const el=$(cid);if(!el)return;if(cnt){const ce=$(cnt);if(ce)ce.textContent=ls.filter(t=>!t.done).length}if(!ls.length){el.innerHTML='<div class="te">등록된 할 일이 없습니다</div>';return}el.innerHTML=ls.map(t=>{const ts=t.time?fmT(t.time):'',ov=t.time&&!t.done&&ds===tds()&&isOv(t.time),ei=esc(t.id),hm=t.memo&&t.memo.trim();return`<div class="tc ${t.done?'done':''} ${t.importance==='must'?'imp':''}" data-id="${ei}" draggable="true" ondragstart="dSt(event)" ondragover="dOv(event)" ondrop="dDr(event,'${cid}','${ds}')"><div class="ck" onclick="tog('${ei}')">${t.done?'✓':''}</div><div class="tb" onclick="${hm?`togMemo('${ei}')`:`tog('${ei}')`}"><div class="tt">${esc(t.title)}</div><div class="tm">${ts?`<span style="${ov?'color:#E53935;font-weight:600':''}">⏰ ${ts}${ov?' (지남)':''}</span>`:''}<span>${t.importance==='must'?'⭐필수':'보통'}</span>${t.recurId?'<span>🔁</span>':''}${hm?'<span>📝</span>':''}</div>${hm?`<div style="font-size:11px;color:var(--text-sub);margin-top:4px;padding:4px 8px;background:var(--cream);border-radius:var(--radius-xs);display:none;white-space:pre-wrap" id="memo-${ei}">${esc(t.memo)}</div>`:''}</div><div class="tx">+${t.importance==='must'?2:1}</div><div class="ta">${!t.done?`<button class="tab" onclick="moveTmr('${ei}')" title="내일로">➡️</button>`:''}<button class="tab" onclick="editTd('${ei}')" title="수정">✏️</button><button class="tab" onclick="del('${ei}')">🗑</button></div></div>`}).join('')}

// ═══ JOURNEY MAP (징검다리) ═══
function rJrn(){
  const jm=$('jrnMap');if(!jm)return;
  const days=['월','화','수','목','금','토','일'];
  const now=new Date();const dow=(now.getDay()+6)%7;
  // 이번 주 월요일 구하기
  const mon=new Date(now);mon.setDate(mon.getDate()-dow);
  let html='<div style="display:flex;align-items:flex-end;gap:4px;padding:12px 0;overflow-x:auto">';
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(d.getDate()+i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const todos=S.todos.filter(t=>t.date===ds);
    const total=todos.length;const done=todos.filter(t=>t.done).length;
    const xp=todos.filter(t=>t.done).reduce((s,t)=>s+(t.importance==='must'?2:1),0);
    const isToday=i===dow;const isPast=i<dow;const isFuture=i>dow;
    const pct=total>0?Math.round(done/total*100):0;
    const filled=isPast?(pct===100):(isToday&&pct===100);
    const bg=filled?'var(--primary)':isToday?'var(--primary-light)':(isPast&&total>0?'#E8F5E9':'var(--cream)');
    const border=isToday?'2px solid var(--primary)':'1px solid var(--border)';
    const clr=filled?'#fff':(isToday?'var(--primary-dark)':'var(--text-sub)');
    const op=isFuture?'0.5':'1';
    // 징검다리 돌 높이: 완료율에 따라
    const h=40+pct*0.3;
    html+=`<div style="flex:1;min-width:36px;text-align:center;opacity:${op}">`;
    html+=`<div style="width:100%;height:${h}px;background:${bg};border:${border};border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:all .3s">`;
    if(filled)html+='<div style="font-size:14px">✅</div>';
    else if(total>0)html+=`<div style="font-size:11px;font-weight:700;color:${clr}">${done}/${total}</div>`;
    else html+=`<div style="font-size:10px;color:var(--text-hint)">-</div>`;
    if(xp>0)html+=`<div style="font-size:8px;color:${filled?'rgba(255,255,255,.8)':'var(--primary)'};font-weight:600">+${xp}</div>`;
    html+='</div>';
    html+=`<div style="font-size:10px;margin-top:4px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--primary)':'var(--text-hint)'}">${days[i]}</div>`;
    html+=`<div style="font-size:8px;color:var(--text-hint)">${d.getDate()}일</div>`;
    html+='</div>';
    // 징검다리 연결선 (마지막 아닌 경우)
    if(i<6){
      const nextFilled=false;
      html+=`<div style="width:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding-bottom:24px"><div style="width:8px;height:2px;background:${(filled||isPast)?'var(--primary-light)':'var(--border)'}"></div></div>`;
    }
  }
  html+='</div>';
  jm.innerHTML=html;
}
