<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B5E20">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>할일농장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#2E7D32;--primary-light:#4CAF50;--primary-dark:#1B5E20;--primary-bg:rgba(46,125,50,0.06);--cream:#FAFAF5;--warm:#F3F0E8;--gold:#F9A825;--text:#1C1C1C;--text-sub:#6E6E6E;--text-hint:#AAA;--border:rgba(0,0,0,0.08);--shadow:0 1px 4px rgba(0,0,0,0.06);--shadow-md:0 4px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 24px rgba(0,0,0,0.12);--radius:16px;--radius-sm:10px;--radius-xs:6px;--nav-h:56px;--safe-bottom:env(safe-area-inset-bottom,0px);--fab-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;outline:none}
.app{display:none;flex-direction:column;height:100%}
.main{flex:1;overflow:hidden;position:relative}
.page{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.nav{display:flex;align-items:center;justify-content:space-around;height:var(--nav-h);background:#fff;border-top:1px solid var(--border);flex-shrink:0;z-index:100;padding-bottom:var(--safe-bottom)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 16px;color:var(--text-hint);font-size:10px;font-weight:500;transition:color .2s;min-width:56px}
.nav-btn.on{color:var(--primary)}
.nav-btn .ni{font-size:20px;line-height:1}
#splash{position:fixed;inset:0;background:linear-gradient(145deg,#1B5E20,#2E7D32,#388E3C);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s}
#splash.hide{opacity:0;pointer-events:none}
.splash-t{font-family:'Gaegu',cursive;font-size:48px;color:#fff;letter-spacing:2px}
.splash-s{font-size:13px;color:rgba(255,255,255,.6);margin-top:4px}
.splash-e{font-size:64px;margin-bottom:16px;animation:bi .8s ease-out}
.hh{padding:20px 20px 16px;background:linear-gradient(180deg,#E8F5E9,var(--cream))}
.hp{display:flex;align-items:center;gap:14px}
.ha{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;box-shadow:var(--shadow-md);overflow:hidden;background:#fff;flex-shrink:0}
.ha img{width:90%;height:90%;object-fit:contain}
.ha .tr{position:absolute;inset:-3px;border-radius:50%;border:3px solid var(--gold)}
.hi{flex:1;min-width:0}
.hn{font-size:15px;font-weight:700}
.ht{font-size:11px;font-weight:600;margin-top:1px}
.hx{font-size:10px;color:var(--text-sub);margin-top:3px}
.xb{height:6px;background:var(--border);border-radius:3px;margin-top:4px;overflow:hidden}
.xf{height:100%;background:linear-gradient(90deg,var(--primary-light),var(--primary));border-radius:3px;transition:width .5s}
.sb{display:flex;align-items:center;gap:8px;margin:10px 20px 0;padding:10px 14px;background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow)}
.sf{font-size:20px}
.si{flex:1}
.sc{font-size:13px;font-weight:700}
.sl{font-size:10px;color:var(--text-sub)}
.sh{font-size:13px;font-weight:700;padding:18px 20px 8px;display:flex;align-items:center;gap:6px}
.sh .bg{font-size:10px;color:#fff;background:var(--primary);padding:1px 7px;border-radius:10px}
.tl{padding:0 20px}
.te{text-align:center;color:var(--text-hint);font-size:12px;padding:20px 0}
.tc{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;margin-bottom:6px;background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow);transition:all .3s}
.tc.done{opacity:.45}
.tc.done .tt{text-decoration:line-through;color:var(--text-hint)}
.tc.imp{border-left:3px solid var(--primary)}
.ck{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:all .2s;margin-top:1px}
.tc.done .ck{background:var(--primary);border-color:var(--primary);color:#fff}
.tb{flex:1;min-width:0}
.tt{font-size:13px;font-weight:500;line-height:1.4;transition:all .3s}
.tm{font-size:10px;color:var(--text-hint);margin-top:2px;display:flex;align-items:center;gap:6px}
.tx{font-size:10px;font-weight:700;color:var(--primary);flex-shrink:0}
.ta{display:flex;gap:4px;flex-shrink:0;margin-top:2px}
.tab{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-hint)}
.tab:active{background:var(--border)}
.fab{position:fixed;right:20px;bottom:var(--fab-bottom);width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(46,125,50,.35);z-index:90;line-height:1}
.fab:active{transform:scale(.9)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mo.show{display:flex}
.mp{width:100%;max-width:500px;max-height:85vh;background:#fff;border-radius:var(--radius) var(--radius) 0 0;display:flex;flex-direction:column;overflow:hidden;animation:su .3s ease-out}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mb{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.mt{font-size:16px;font-weight:700}
.mc{font-size:20px;color:var(--text-sub);padding:4px 8px}
.md{flex:1;overflow-y:auto;padding:16px 20px 24px}
.fc{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.fp{padding:6px 12px;border-radius:20px;font-size:12px;background:var(--primary-bg);color:var(--primary-dark);border:1px solid rgba(46,125,50,.15)}
.fp:active{background:var(--primary);color:#fff}
.fg{margin-bottom:16px}
.fl{font-size:11px;font-weight:600;color:var(--text-sub);margin-bottom:6px;display:block}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--cream)}
.fi:focus{border-color:var(--primary-light)}
.fr{display:flex;gap:8px}
.fb{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:1.5px solid var(--border);background:#fff;text-align:center}
.fb.on{border-color:var(--primary);background:var(--primary-bg);color:var(--primary-dark)}
.rt{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--radius-sm);background:var(--cream);cursor:pointer}
.rt .rd{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent}
.rt.on .rd{background:var(--primary);border-color:var(--primary);color:#fff}
.ro{display:none;margin-top:10px;padding:12px;background:var(--cream);border-radius:var(--radius-sm)}
.ro.show{display:block}
.rr{display:flex;gap:6px;margin-bottom:10px}
.rb{flex:1;padding:8px;font-size:11px;border-radius:var(--radius-xs);border:1px solid var(--border);background:#fff;text-align:center;font-weight:500}
.rb.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.dc{display:flex;gap:4px;flex-wrap:wrap}
.dp{width:36px;height:36px;border-radius:50%;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center}
.dp.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.sub{width:100%;padding:14px;background:var(--primary);color:#fff;border-radius:var(--radius);font-size:15px;font-weight:700;box-shadow:0 4px 12px rgba(46,125,50,.3);margin-top:8px}
.sub:active{transform:scale(.97)}
.sub:disabled{opacity:.5;pointer-events:none}
.ch{display:flex;align-items:center;justify-content:space-between;padding:16px 20px}
.cm{font-size:17px;font-weight:700}
.cn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-sub)}
.cn:active{background:var(--border)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px}
.cw{text-align:center;font-size:10px;font-weight:600;color:var(--text-hint);padding:4px 0 8px}
.cd{text-align:center;padding:6px 0;cursor:pointer;border-radius:var(--radius-xs);min-height:44px}
.cd:active{background:var(--border)}
.cd.today .dn{font-weight:700;color:var(--primary)}
.cd.sel{background:var(--primary);color:#fff;font-weight:700}
.cd.sel .dn{color:#fff}
.cd.ot{opacity:.3}
.dn{font-size:13px;line-height:1}
.dr{display:flex;justify-content:center;gap:2px;margin-top:3px;min-height:5px}
.dt{width:4px;height:4px;border-radius:50%;background:var(--primary-light)}
.dt.dd{background:var(--text-hint)}
.csd{font-size:13px;font-weight:600;padding:12px 20px 6px;color:var(--text-sub)}
.cv{text-align:center;padding:24px 20px 16px;background:linear-gradient(180deg,#E8F5E9,var(--cream))}
.ca{width:120px;height:120px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:56px;background:#fff;box-shadow:var(--shadow-lg);overflow:hidden}
.ca img{width:90%;height:90%;object-fit:contain}
.cps{margin:16px 20px;padding:16px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow)}
.is{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.it{text-align:center;padding:8px 4px;background:var(--cream);border-radius:var(--radius-sm)}
.it.ul{background:var(--primary-bg);border:1px solid rgba(46,125,50,.15)}
.it.lk{opacity:.35}
.it .ii{font-size:20px;margin-bottom:2px}
.it .il{font-size:8px;color:var(--text-sub)}
.it .ik{font-size:8px;color:var(--text-hint)}
.cog{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 20px}
.cc{background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow);overflow:hidden;text-align:center;padding:8px}
.cc img{width:100%;aspect-ratio:1;object-fit:contain;border-radius:var(--radius-xs);background:var(--cream)}
.ss{padding:16px 20px}
.st{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sk{padding:14px;background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow);margin-bottom:10px}
.sd{font-size:10px;color:var(--text-sub);margin-top:4px}
.sin{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:12px;width:100%;margin-top:6px;background:var(--cream)}
.sin:focus{border-color:var(--primary-light)}
.sbt{padding:8px 16px;border-radius:var(--radius-xs);font-size:12px;font-weight:600;background:var(--primary);color:#fff}
.sbt:active{opacity:.8}
.sbt.ol{background:#fff;color:var(--primary);border:1.5px solid var(--primary)}
.sbt.dg{background:#E53935}
.co{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center}
.co.show{display:flex}
.cm2{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;max-width:300px;width:90%;animation:bi .5s ease-out;box-shadow:var(--shadow-lg)}
.ce{font-size:56px;margin-bottom:8px;animation:pi .6s ease-out .2s both}
.ct2{font-size:18px;font-weight:900;margin-bottom:4px}
.cs2{font-size:12px;color:var(--text-sub);margin-bottom:16px;line-height:1.5;white-space:pre-line}
.cd2{font-size:12px;color:var(--primary);font-weight:700;padding:8px 14px;background:var(--primary-bg);border-radius:var(--radius-sm);display:inline-block;margin-bottom:16px}
.cb{padding:12px 32px;background:var(--primary);color:#fff;border-radius:var(--radius);font-size:14px;font-weight:700}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--text);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0)}
.conf{position:fixed;width:8px;height:8px;top:-10px;z-index:501;pointer-events:none;border-radius:2px}
@keyframes bi{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes pi{0%{transform:scale(0) rotate(-10deg);opacity:0}70%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes cf{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.ri{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border-radius:var(--radius-sm);box-shadow:var(--shadow);margin-bottom:6px}
.ri .rf{flex:1}
.ri .rn{font-size:13px;font-weight:500}
.ri .rl{font-size:10px;color:var(--text-hint)}
.rx{color:var(--text-hint);font-size:14px;padding:4px}
</style>
</head>
<body>
<div id="splash"><div class="splash-e">🌱</div><div class="splash-t">할일농장</div><div class="splash-s">할 일을 완료하고 캐릭터를 키우세요</div></div>
<div class="app" id="app">
<div class="main">
<div class="page active" id="pg-home">
<div class="hh"><div class="hp"><div class="ha"><div class="tr" id="htr"></div><span id="hai">🌱</span></div><div class="hi"><div class="hn" id="hna">농부</div><div class="ht" id="hti">Lv.1 · Seed</div><div class="hx" id="hxp">0/10 XP</div><div class="xb"><div class="xf" id="hxf"></div></div></div></div></div>
<div class="sb"><span class="sf">🔥</span><div class="si"><div class="sc" id="hsk">0일 연속</div><div class="sl">매일 할 일을 완료하세요!</div></div></div>
<div class="sh">📌 오늘 할 일 <span class="bg" id="tc0">0</span></div><div class="tl" id="tl0"></div>
<div class="sh">📅 내일 할 일 <span class="bg" id="tc1">0</span></div><div class="tl" id="tl1"></div>
<div style="height:80px"></div>
</div>
<div class="page" id="pg-cal">
<div class="ch"><button class="cn" onclick="calN(-1)">◀</button><div class="cm" id="calM"></div><button class="cn" onclick="calN(1)">▶</button></div>
<div class="cg" id="calG"></div><div class="csd" id="calD"></div><div class="tl" id="calL" style="padding-bottom:80px"></div>
</div>
<div class="page" id="pg-chr">
<div class="cv"><div class="ca" id="cav"><span id="cai">🌱</span></div><div style="font-size:18px;font-weight:700" id="cna"></div><div id="cti" style="font-size:12px;font-weight:600;margin-top:2px"></div><div id="cli" style="font-size:11px;color:var(--text-sub);margin-top:4px"></div><button onclick="openDU()" style="margin-top:10px;padding:8px 16px;font-size:12px;border:1.5px solid var(--primary-light);border-radius:var(--radius-sm);background:#fff;color:var(--primary-dark);font-weight:600">👗 드레스업</button></div>
<div class="cps"><div style="font-size:12px;font-weight:600;margin-bottom:10px;color:var(--text-sub)">🎽 현재 캐릭터 진행도</div><div class="is" id="isl"></div></div>
<div class="sh">🏆 완성된 캐릭터</div><div class="cog" id="colG"></div>
<div class="sh">🗺️ 이번 주 여정</div><div id="jrnMap" style="padding:0 20px"></div>
<div class="sh">📊 이번 주 통계</div><div style="padding:0 20px 80px"><div class="sk"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center"><div><div style="font-size:22px;font-weight:900" id="s0">0</div><div style="font-size:9px;color:var(--text-hint)">완료</div></div><div><div style="font-size:22px;font-weight:900" id="s1">0</div><div style="font-size:9px;color:var(--text-hint)">XP</div></div><div><div style="font-size:22px;font-weight:900" id="s2">0</div><div style="font-size:9px;color:var(--text-hint)">연속</div></div></div></div></div>
</div>
<div class="page" id="pg-set">
<div class="ss"><div class="st">☁️ Google Sheets 연동</div><div class="sk"><div class="sd" style="margin-bottom:8px">Apps Script URL과 비밀 키를 입력하세요.</div><label class="fl">배포 URL</label><input class="sin" id="sUrl" placeholder="https://script.google.com/macros/s/..."><label class="fl" style="margin-top:8px">비밀 키</label><input class="sin" id="sKey" type="password" placeholder="비밀 키"><div style="display:flex;gap:8px;margin-top:8px"><button class="sbt" onclick="syncNow()">🔄 동기화</button><button class="sbt ol" onclick="showGuide()">📖 가이드</button></div><div id="sySt" style="font-size:10px;color:var(--text-hint);margin-top:6px"></div></div></div>
<div class="ss"><div class="st">🔁 반복 할 일</div><div id="rcL"></div><button class="sbt ol" style="margin-top:8px;width:100%;padding:10px" onclick="openAdd(1)">+ 반복 할 일 추가</button></div>
<div class="ss"><div class="st">🔑 AI 캐릭터</div><div class="sk"><div class="sd">Puter API로 캐릭터를 생성합니다.</div><input class="sin" id="pTk" type="password" placeholder="Puter API 토큰"><button class="sbt" style="margin-top:6px" onclick="savePT()">저장</button></div></div>
<div class="ss"><div class="st">👤 프로필</div><div class="sk"><label class="fl">이름</label><input class="sin" id="pNm" placeholder="이름" style="margin-top:0"><button class="sbt" style="margin-top:6px" onclick="saveNm()">저장</button></div><div class="sk" style="margin-top:10px"><button class="sbt dg" onclick="resetAll()">⚠️ 초기화</button></div></div>
<div style="height:40px"></div>
</div>
</div>
<nav class="nav"><button class="nav-btn on" data-t="home" onclick="goT('home')"><span class="ni">🏠</span>홈</button><button class="nav-btn" data-t="cal" onclick="goT('cal')"><span class="ni">📅</span>캘린더</button><button class="nav-btn" data-t="chr" onclick="goT('chr')"><span class="ni">🐾</span>캐릭터</button><button class="nav-btn" data-t="set" onclick="goT('set')"><span class="ni">⚙️</span>설정</button></nav>
<button class="fab" id="fab" onclick="openAdd()">+</button>
</div>
<div class="mo" id="addM" onclick="if(event.target===this)closeAdd()"><div class="mp"><div class="mb"><span class="mt">할 일 추가</span><button class="mc" onclick="closeAdd()">✕</button></div><div class="md">
<div class="fc" id="fqC"></div>
<div class="fg"><label class="fl">할 일</label><input class="fi" id="aIn" placeholder="할 일을 입력하세요" maxlength="100"></div>
<div class="fg"><label class="fl">날짜</label><input class="fi" id="aDt" type="date"></div>
<div class="fg"><label class="fl">목표 시간 (선택)</label><input class="fi" id="aTm" type="time"><div style="font-size:10px;color:var(--text-hint);margin-top:4px">비워두면 시간 제한 없음</div></div>
<div class="fg"><label class="fl">중요도</label><div class="fr"><button class="fb on" data-i="must" onclick="setImp('must')">⭐ 필수 (2XP)</button><button class="fb" data-i="normal" onclick="setImp('normal')">보통 (1XP)</button></div></div>
<div class="fg"><label class="fl">반복 설정</label><div class="rt" id="rcT" onclick="togRc()"><div class="rd">✓</div><span style="font-size:13px">반복 등록</span></div><div class="ro" id="rcO"><div class="rr"><button class="rb on" data-r="weekly" onclick="setRT('weekly')">매주</button><button class="rb" data-r="monthly" onclick="setRT('monthly')">매월</button><button class="rb" data-r="interval" onclick="setRT('interval')">N일마다</button></div><div id="rcD"></div></div></div>

function loadSt(){try{const r=localStorage.getItem('todo_farm_state');if(!r)return{profile:{...DP},todos:[],recurring:[],freqMap:{}};const s=JSON.parse(r);if(!s.profile)s.profile={};Object.keys(DP).forEach(k=>{if(s.profile[k]===undefined)s.profile[k]=JSON.parse(JSON.stringify(DP[k]))});if(!Array.isArray(s.todos))s.todos=[];if(!Array.isArray(s.recurring))s.recurring=[];if(!s.freqMap||typeof s.freqMap!=='object')s.freqMap={};if(!s.profile.unlockedItems)s.profile.unlockedItems={top:[],bottom:[],shoes:[],hat:[],acc:[],prop:[]};if(!s.profile.equipped)s.profile.equipped={};if(!s.profile.charImages)s.profile.charImages={};if(!Array.isArray(s.profile.completedChars))s.profile.completedChars=[];s.profile.completedChars.forEach(c=>{if(!c.animalName)c.animalName=AK[c.animalIdx]||'?';if(!c.equippedNames)c.equippedNames={};if(!c.date)c.date=''});if(typeof s.profile.level!=='number'||s.profile.level<1)s.profile.level=1;if(typeof s.profile.xp!=='number'||s.profile.xp<0)s.profile.xp=0;if(typeof s.profile.streak!=='number'||s.profile.streak<0)s.profile.streak=0;s.todos=s.todos.filter(t=>t&&t.id&&t.title);s.recurring=s.recurring.filter(r=>r&&r.id&&r.title);return s}catch(e){return{profile:{...DP},todos:[],recurring:[],freqMap:{}}}}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function tds(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function tms(){const d=new Date();d.setDate(d.getDate()+1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dlb(s){if(!s||!s.includes('-'))return'';const p=s.split('-');return`${+p[1]}월 ${+p[2]}일`}
function esc(s){return typeof s==='string'?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''}
function fmT(t){if(!t||!t.includes(':'))return'';const p=t.split(':'),h=parseInt(p[0])||0;return`${h>=12?(h===12?12:h-12):h||12}:${p[1]||'00'} ${h>=12?'PM':'AM'}`}
function isOv(t){if(!t||!t.includes(':'))return false;const n=new Date(),p=t.split(':').map(Number);return n.getHours()>p[0]||(n.getHours()===p[0]&&n.getMinutes()>=p[1])}
function gOK(p){if(!p||!p.equipped)return'body';const r=[];IC.slice(1).forEach(c=>{if(p.equipped[c])r.push(p.equipped[c])});return r.length?r.sort().join('+'):'body'}
function gOI(p){if(!p||!p.charImages||typeof p.charImages!=='object')return null;const k=gOK(p);return p.charImages[k]||p.charImages.body||null}

function cOT(){const c=new Date();c.setDate(c.getDate()-30);const cs=c.getFullYear()+'-'+String(c.getMonth()+1).padStart(2,'0')+'-'+String(c.getDate()).padStart(2,'0');const b=S.todos.length;S.todos=S.todos.filter(t=>!t.done||t.date>=cs);if(S.todos.length<b)sv()}

function goT(t){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));$('pg-'+t).classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('on',b.dataset.t===t));try{if(t==='home')uH();if(t==='cal'){const d=new Date();cY=d.getFullYear();cM=d.getMonth();cSD=tds();rCal()}if(t==='chr')uCh();if(t==='set')uSet()}catch(e){console.error(e)}$('fab').style.display=t==='set'?'none':''}

function uH(){const p=S.profile,tc=gTC(p.level),img=gOI(p);
$('hai').innerHTML=img?`<img src="${img}">`:(p.animalIdx>=0?`<span style="font-size:32px">${AN[p.animalIdx]||'🌱'}</span>`:'🌱');

function rTL(cid,ds,cnt){const ls=S.todos.filter(t=>t.date===ds).sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;const at=a.time||'',bt=b.time||'';if(at&&!bt)return-1;if(!at&&bt)return 1;if(at&&bt)return at.localeCompare(bt);if(a.importance!==b.importance)return a.importance==='must'?-1:1;return 0});const el=$(cid);if(!el)return;if(cnt){const ce=$(cnt);if(ce)ce.textContent=ls.filter(t=>!t.done).length}if(!ls.length){el.innerHTML='<div class="te">등록된 할 일이 없습니다</div>';return}el.innerHTML=ls.map(t=>{const ts=t.time?fmT(t.time):'',ov=t.time&&!t.done&&ds===tds()&&isOv(t.time),ei=esc(t.id);return`<div class="tc ${t.done?'done':''} ${t.importance==='must'?'imp':''}"><div class="ck" onclick="tog('${ei}')">${t.done?'✓':''}</div><div class="tb" onclick="tog('${ei}')"><div class="tt">${esc(t.title)}</div><div class="tm">${ts?`<span style="${ov?'color:#E53935;font-weight:600':''}">⏰ ${ts}${ov?' (지남)':''}</span>`:''}<span>${t.importance==='must'?'⭐필수':'보통'}</span>${t.recurId?'<span>🔁</span>':''}</div></div><div class="tx">+${t.importance==='must'?2:1}</div><div class="ta"><button class="tab" onclick="del('${ei}')">🗑</button></div></div>`}).join('')}

// ═══ TODO CRUD ═══
function tog(id){if(_td[id])return;_td[id]=1;setTimeout(()=>{delete _td[id]},300);const t=S.todos.find(x=>x.id===id);if(!t)return;const w=t.done;t.done=!t.done;if(t.done&&!w){const x=t.importance==='must'?2:1;addXP(x);toast(`+${x} XP 🌟`);uSk();S.freqMap[t.title]=(S.freqMap[t.title]||0)+1}else if(!t.done&&w){S.profile.xp=Math.max(0,S.profile.xp-(t.importance==='must'?2:1))}sv();uH();if($('pg-cal').classList.contains('active'))rCal();dbSy()}
function del(id){if(!confirm('삭제?'))return;S.todos=S.todos.filter(t=>t.id!==id);sv();uH();if($('pg-cal').classList.contains('active'))rCal();dbSy()}
function addXP(a){const p=S.profile;p.xp+=a;while(p.xp>=XPL){p.xp-=XPL;p.level++;onLU(p.level)}sv()}
function uSk(){const p=S.profile,td=tds();if(p.streakDate===td)return;const y=new Date();y.setDate(y.getDate()-1);const ys=y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');p.streak=p.streakDate===ys?p.streak+1:1;p.streakDate=td;sv()}

// ═══ LEVEL UP ═══
function onLU(nl){const cl=((nl-1)%LPC)+1,ci=Math.floor((nl-1)/LPC);if(cl===1&&ci>0){savCol();showCel('🐾','새 캐릭터!',`${ci+1}번째 캐릭터!`,`Lv.${nl}`);setTimeout(showAS,1500)}else if(cl===7){ulRI(IC[cl-1]);showCel('🎉','캐릭터 완성!','모든 아이템 해금!\n다음 레벨에서 새 캐릭터',`${IO[cl-1]} 해금!`)}else if(cl>1){ulRI(IC[cl-1]);showCel('🎁','레벨 업!',`${IO[cl-1]} 획득!`,`Lv.${nl}`)}else{showCel('⬆️','레벨 업!',`Lv.${nl}!`,`${XPL} XP → 다음`)}spCf()}
function ulRI(cat){if(cat==='body')return;const its=ID[cat];if(!its||!its.length)return;const p=S.profile;if(!p.unlockedItems[cat])p.unlockedItems[cat]=[];const lk=its.filter(i=>!p.unlockedItems[cat].includes(i.id));if(!lk.length)return;const pk=lk[Math.floor(Math.random()*lk.length)];p.unlockedItems[cat].push(pk.id);p.equipped[cat]=pk.id;sv();toast(`🎁 ${pk.n}!`)}

// ═══ JOURNEY MAP (징검다리) ═══
function rJrn(){
  const jm=$('jrnMap');if(!jm)return;
  const days=['월','화','수','목','금','토','일'];
  const now=new Date();const dow=(now.getDay()+6)%7;
  // 이번 주 월요일 구하기
  const mon=new Date(now);mon.setDate(mon.getDate()-dow);
  let html='<div style="display:flex;align-items:flex-end;gap:4px;padding:12px 0;overflow-x:auto">';
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(d.getDate()+i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const todos=S.todos.filter(t=>t.date===ds);
    const total=todos.length;const done=todos.filter(t=>t.done).length;
    const xp=todos.filter(t=>t.done).reduce((s,t)=>s+(t.importance==='must'?2:1),0);
    const isToday=i===dow;const isPast=i<dow;const isFuture=i>dow;
    const pct=total>0?Math.round(done/total*100):0;
    const filled=isPast?(pct===100):(isToday&&pct===100);
    const bg=filled?'var(--primary)':isToday?'var(--primary-light)':(isPast&&total>0?'#E8F5E9':'var(--cream)');
    const border=isToday?'2px solid var(--primary)':'1px solid var(--border)';
    const clr=filled?'#fff':(isToday?'var(--primary-dark)':'var(--text-sub)');
    const op=isFuture?'0.5':'1';
    // 징검다리 돌 높이: 완료율에 따라
    const h=40+pct*0.3;
    html+=`<div style="flex:1;min-width:36px;text-align:center;opacity:${op}">`;
    html+=`<div style="width:100%;height:${h}px;background:${bg};border:${border};border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:all .3s">`;
    if(filled)html+='<div style="font-size:14px">✅</div>';
    else if(total>0)html+=`<div style="font-size:11px;font-weight:700;color:${clr}">${done}/${total}</div>`;
    else html+=`<div style="font-size:10px;color:var(--text-hint)">-</div>`;
    if(xp>0)html+=`<div style="font-size:8px;color:${filled?'rgba(255,255,255,.8)':'var(--primary)'};font-weight:600">+${xp}</div>`;
    html+='</div>';
    html+=`<div style="font-size:10px;margin-top:4px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--primary)':'var(--text-hint)'}">${days[i]}</div>`;
    html+=`<div style="font-size:8px;color:var(--text-hint)">${d.getDate()}일</div>`;
    html+='</div>';
    // 징검다리 연결선 (마지막 아닌 경우)
    if(i<6){
      const nextFilled=false;
      html+=`<div style="width:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding-bottom:24px"><div style="width:8px;height:2px;background:${(filled||isPast)?'var(--primary-light)':'var(--border)'}"></div></div>`;
    }
  }
  html+='</div>';
  jm.innerHTML=html;
}

function loadSt2(d){if(!d.profile)d.profile={};Object.keys(DP).forEach(k=>{if(d.profile[k]===undefined)d.profile[k]=JSON.parse(JSON.stringify(DP[k]))});if(!Array.isArray(d.todos))d.todos=[];if(!Array.isArray(d.recurring))d.recurring=[];if(!d.freqMap)d.freqMap={};if(!d.profile.unlockedItems)d.profile.unlockedItems={top:[],bottom:[],shoes:[],hat:[],acc:[],prop:[]};if(!d.profile.equipped)d.profile.equipped={};if(!d.profile.charImages)d.profile.charImages={};if(!Array.isArray(d.profile.completedChars))d.profile.completedChars=[];d.profile.completedChars.forEach(c=>{if(!c.animalName)c.animalName=AK[c.animalIdx]||'?';if(!c.equippedNames)c.equippedNames={};if(!c.date)c.date=''});return d}
function syncNow(){sUrl=$('sUrl').value.trim();localStorage.setItem('todo_farm_sheets',sUrl);sKey=$('sKey').value.trim();localStorage.setItem('todo_farm_sheets_key',sKey);if(!sUrl){toast('URL 입력');return}if(!sKey){toast('비밀 키 입력');return}syTo();toast('동기화 중...')}

설정에 입력, 비밀 키도 동일하게</div><div style="color:var(--primary);font-weight:600">⚠️ SECRET을 변경하고 앱과 동일하게!</div>`}
function closeGuide(){$('guiM').classList.remove('show')}
